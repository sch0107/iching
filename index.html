<!DOCTYPE html>
<html lang="zh">
<head>

  <meta name="description" content="Traditional Chinese divination - I Ching, Tarot, Coin Toss, and more" />
  <meta name="theme-color" content="#150f05" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="易经" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="易经起卦" />
  <meta name="msapplication-TileColor" content="#150f05" />
  <meta name="msapplication-config" content="/iching/browserconfig.xml" />
  <link rel="manifest" href="/iching/manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="/iching/icon-32.png" />

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #150f05; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/main.jsx"></script>
  <script>
    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/iching/sw.js')
          .then((registration) => {
            console.log('Service Worker registered:', registration.scope);
          })
          .catch((error) => {
            console.log('Service Worker registration failed:', error);
          });
      });
    }
  </script>
</body>
